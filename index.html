<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-left">
            <img src="assets/github-logo.png" alt="GitHub Logo" class="nav-logo">
            <h2 class="nav-title">GitHub Issues Tracker</h2>
        </div>
        <div class="nav-right">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="Search issues...">
                <button id="searchBtn" class="search-btn">Search</button>
            </div>
        </div>
    </nav>
</body>

</html>
