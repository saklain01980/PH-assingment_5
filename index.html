<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-left">
            <img src="assets/github-logo.png" alt="GitHub Logo" class="nav-logo">
            <h2 class="nav-title">GitHub Issues Tracker</h2>
        </div>
        <div class="nav-right">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="Search issues...">
                <button id="searchBtn" class="search-btn">Search</button>
            </div>
        </div>
    </nav>
    <main class="main-content">
        <div class="tab-section">
            <div class="tabs">
                <button class="tab-btn active" id="tabAll" onclick="handleTab('all')">All</button>
                <button class="tab-btn" id="tabOpen" onclick="handleTab('open')">Open</button>
                <button class="tab-btn" id="tabClosed" onclick="handleTab('closed')">Closed</button>
            </div>
        </div>

        <div class="info-bar">
            <div class="info-left">
                <img src="assets/Aperture.png" alt="Aperture" class="info-icon">
                <div class="info-text">
                    <span id="issueCount" class="info-count">50 Issues</span>
                    <span class="info-subtitle">Track and manage your project issues</span>
                </div>
            </div>
            <div class="info-right">
                <span class="status-legend open-legend">
                    <span class="legend-dot open-dot"></span> Open
                </span>
                <span class="status-legend closed-legend">
                    <span class="legend-dot closed-dot"></span> Closed
                </span>
            </div>
        </div>

        <div id="loadingSpinner" class="loading-spinner">
            <div class="spinner"></div>
            <p>Loading issues...</p>
        </div>

        <div id="issuesGrid" class="issues-grid"></div>
    </main>
    <div id="modalOverlay" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModalBtn()">&times;</button>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
