<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/github-logo.png" alt="GitHub Logo" class="login-logo">
                <h1 class="login-title">GitHub Issues Tracker</h1>
                <p class="login-subtitle">Sign in to manage your issues</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter Username" required>
                    <span class="input-hint">Default: admin</span>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter Password" required>
                    <span class="input-hint">Default: admin123</span>
                </div>
                <p id="errorMsg" class="error-message"></p>
                <button type="submit" class="sign-in-btn">Sign In</button>
            </form>
        </div>
    </div>

    <script>
       
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            var errorMsg = document.getElementById('errorMsg');

            if (username === 'admin' && password === 'admin123') {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'index.html';
            } else {
                errorMsg.textContent = 'Invalid username or password. Please try again.';
            }
        });
    </script>
</body>

</html>
